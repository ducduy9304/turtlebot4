ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Use wheel-odometry twist only (vx, vy, wz).
    # Avoid fusing pose+twist from the same source to reduce correlation issues.
    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_nodelay: false

    # Use IMU angular velocity Z only.
    # Do NOT fuse IMU yaw orientation here because this platform has no magnetometer
    # correction in the published orientation, so yaw drifts during long rotations.
    imu0: imu
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 30
    imu0_nodelay: false
    imu0_remove_gravitational_acceleration: false

    # Reject abnormal spikes during vibration or power noise events.
    odom0_twist_rejection_threshold: 2.5
    imu0_angular_velocity_rejection_threshold: 1.2

    # Conservative process noise for indoor differential drive.
